# Pre-commit hooks. Install once with: uv run pre-commit install
# The large-file hook is deliberate: it stops a 331KB base64 blob (like the old
# install_engine.py) from ever being committed again.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=256]
      - id: check-merge-conflict
      - id: detect-private-key
